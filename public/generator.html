<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 540px;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }
    p {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      margin-bottom: 20px;
      outline: none;
    }
    input:focus {
      border-color: #555;
    }
    input::placeholder {
      color: #555;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #ddd;
    }
    .error {
      color: #ff4444;
      font-size: 13px;
      margin-top: -14px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>HTML File Generator</h1>
    <p>Paste your deployed proxy link below. This will generate a standalone HTML file you can host anywhere — it uses your deployed app as the engine.</p>

    <label>Your deployed link</label>
    <input id="url" type="text" placeholder="https://your-app.onrender.com" />
    <div class="error" id="error">Please enter a valid URL starting with https://</div>

    <label>Page title (optional)</label>
    <input id="title" type="text" placeholder="My Site" />

    <button onclick="generate()">Generate & Download HTML</button>
  </div>

  <script>
    function generate() {
      const url = document.getElementById('url').value.trim();
      const title = document.getElementById('title').value.trim() || 'My Site';
      const error = document.getElementById('error');

      if (!url.startsWith('http')) {
        error.style.display = 'block';
        return;
      }
      error.style.display = 'none';

      const html = `<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${title}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <iframe src="${url}" allowfullscreen></iframe>
</body>
</html>`;

      const blob = new Blob([html], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'index.html';
      a.click();
    }
  </script>
</body>
</html>
